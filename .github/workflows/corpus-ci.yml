# 必須 CI — ポカヨケ設計 柱1。
# 文書整合性（validate）と型チェック（typecheck）を全 PR で検証する。
# ブランチ保護で両ジョブを必須チェックに設定すると、red のままマージできなくなる。

name: corpus-ci

on:
  pull_request:
    branches: [main]
  # main への push 後も検証する。base が古いまま並行マージされた 2 つの PR が
  # それぞれ単独では緑でも、マージ後の main で index.json↔ファイルの不整合を
  # 生むことがある。post-merge で走らせて即座にドリフトを検知する。
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run validate:corpus

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
